<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="card">
    <h1>Temperature Converter</h1>

    <div class="input-group">
      <label>Celsius</label>
      <input type="number" id="input-celsius" placeholder="Enter °C" />
      <span class="unit">°C</span>
    </div>

    <div class="input-group">
      <label>Fahrenheit</label>
      <input type="number" id="input-fahrenheit" placeholder="Enter °F" />
      <span class="unit">°F</span>
    </div>

    <div class="divider"></div>

    <div class="result-box">
      <span class="result-label">Kelvin</span>
      <div class="result-value" id="result-kelvin">—<span>K</span></div>
    </div>

    <div class="result-box">
      <span class="result-label">Fahrenheit</span>
      <div class="result-value" id="result-fahrenheit">—<span>°F</span></div>
    </div>

    <div class="result-box">
      <span class="result-label">Celsius</span>
      <div class="result-value" id="result-celsius">—<span>°C</span></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
