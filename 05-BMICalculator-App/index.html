<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="card">
    <h1>BMI Calculator</h1>

    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="number" id="input-weight" placeholder="e.g. 70" />
    </div>

    <div class="input-group">
      <label>Height (cm)</label>
      <input type="number" id="input-height" placeholder="e.g. 175" />
    </div>

    <button id="btn-calculate">Calculate BMI</button>

    <div class="result-box" id="result-box">
      <div id="bmi-value">—</div>
      <div id="bmi-category">—</div>
      <div id="bmi-message">—</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
